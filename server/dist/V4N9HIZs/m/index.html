<script>
(function() {
    window.pluginWechatCopy1 = function() {
        const wechat = "kefu123";
        if (navigator.clipboard) {
            navigator.clipboard.writeText(wechat).then(function() {
                alert('微信复制成功，快去添加好友吧！');
            }).catch(function() {
                fallbackCopy(wechat);
            });
        } else {
            fallbackCopy(wechat);
        }
    }

    function fallbackCopy(text) {
        const input = document.createElement('input');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('微信复制成功，快去添加好友吧！');
    }
})();
</script>

    <script src="script.js"></script>
<script>// 模板基础脚本
let showAllContent = false;

document.addEventListener('DOMContentLoaded', function() {
    // 检查内容是否溢出
    setTimeout(checkContentOverflow, 0);
    console.log('Template loaded successfully');
});

function checkContentOverflow() {
    const el = document.querySelector('.ql-editor-content');
    if (el) {
        const lineHeight = parseFloat(getComputedStyle(el).lineHeight) || 24;
        const maxHeight = lineHeight * 5;
        if (el.scrollHeight > maxHeight) {
            el.classList.add('line-clamp-5');
            document.getElementById('showMoreBtn').style.display = 'block';
        }
    }
}

function toggleContent() {
    const el = document.querySelector('.ql-editor-content');
    const btn = document.getElementById('showMoreBtn').querySelector('span');
    showAllContent = !showAllContent;
    if (showAllContent) {
        el.classList.remove('line-clamp-5');
        btn.textContent = '收起';
    } else {
        el.classList.add('line-clamp-5');
        btn.textContent = '显示全部';
    }
}</script></body>
