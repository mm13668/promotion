<div class="plugin-wechat-copy-2">
    <div class="copy-modal" id="copyModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <h3 class="modal-title">复制成功</h3>
                <p class="modal-desc">微信号已复制到剪贴板</p>
            </div>
            <div class="modal-body">
                <div class="wechat-info">
                    <div class="info-label">客服微信</div>
                    <div class="info-value" id="wechatValue"></div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn btn-primary" onclick="goToWechat()">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 0 1-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                        <span>去微信</span>
                    </button>
                    <button class="action-btn btn-secondary" onclick="callPhone()">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        <span>拨打电话</span>
                    </button>
                </div>
            </div>
            <button class="close-btn" onclick="closeCopyModal()">关闭</button>
        </div>
    </div>
</div>
<style>
.plugin-wechat-copy-2 .copy-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

.plugin-wechat-copy-2 .copy-modal.show {
    display: flex;
}

.plugin-wechat-copy-2 .modal-content {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 20px;
    padding: 24px;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
    animation: slideUp 0.4s ease-out;
    position: relative;
}

@keyframes slideUp {
    from {
        transform: translateY(50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.plugin-wechat-copy-2 .modal-header {
    text-align: center;
    margin-bottom: 20px;
}

.plugin-wechat-copy-2 .success-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: scaleIn 0.5s ease-out;
}

@keyframes scaleIn {
    from {
        transform: scale(0);
    }
    to {
        transform: scale(1);
    }
}

.plugin-wechat-copy-2 .success-icon svg {
    color: #fff;
    stroke-width: 2;
}

.plugin-wechat-copy-2 .modal-title {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 8px 0;
}

.plugin-wechat-copy-2 .modal-desc {
    color: rgba(255, 255, 255, 0.8);
    font-size: 14px;
    margin: 0;
}

.plugin-wechat-copy-2 .modal-body {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
}

.plugin-wechat-copy-2 .wechat-info {
    text-align: center;
    margin-bottom: 16px;
}

.plugin-wechat-copy-2 .info-label {
    color: rgba(255, 255, 255, 0.7);
    font-size: 12px;
    margin-bottom: 4px;
}

.plugin-wechat-copy-2 .info-value {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    word-break: break-all;
}

.plugin-wechat-copy-2 .action-buttons {
    display: flex;
    gap: 8px;
}

.plugin-wechat-copy-2 .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.plugin-wechat-copy-2 .action-btn svg {
    width: 18px;
    height: 18px;
}

.plugin-wechat-copy-2 .btn-primary {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    color: #fff;
    box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3);
}

.plugin-wechat-copy-2 .btn-primary:active {
    transform: scale(0.95);
    box-shadow: 0 2px 6px rgba(79, 172, 254, 0.3);
}

.plugin-wechat-copy-2 .btn-secondary {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    backdrop-filter: blur(4px);
}

.plugin-wechat-copy-2 .btn-secondary:active {
    transform: scale(0.95);
    background: rgba(255, 255, 255, 0.3);
}

.plugin-wechat-copy-2 .close-btn {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.8);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.plugin-wechat-copy-2 .close-btn:active {
    transform: scale(0.95);
    background: rgba(255, 255, 255, 0.2);
}

/* 移动端适配 */
@media (max-width: 480px) {
    .plugin-wechat-copy-2 .modal-content {
        padding: 20px;
        max-width: 280px;
    }

    .plugin-wechat-copy-2 .success-icon {
        width: 56px;
        height: 56px;
    }

    .plugin-wechat-copy-2 .success-icon svg {
        width: 40px;
        height: 40px;
    }

    .plugin-wechat-copy-2 .modal-title {
        font-size: 18px;
    }

    .plugin-wechat-copy-2 .modal-desc {
        font-size: 13px;
    }

    .plugin-wechat-copy-2 .info-value {
        font-size: 16px;
    }

    .plugin-wechat-copy-2 .action-btn {
        padding: 10px;
        font-size: 13px;
    }

    .plugin-wechat-copy-2 .action-btn svg {
        width: 16px;
        height: 16px;
    }
}
</style>
<script>
(function() {
    // 显示复制成功弹窗
    window.showCopySuccessPopup = function() {
        const modal = document.getElementById('copyModal');
        const wechatValue = document.getElementById('wechatValue');
        const wechat = window.currentService?.wechat || window.wechat;

        if (wechatValue) {
            wechatValue.textContent = wechat;
        }

        if (modal) {
            modal.classList.add('show');
        }
    }

    // 关闭弹窗
    window.closeCopyModal = function() {
        const modal = document.getElementById('copyModal');
        if (modal) {
            modal.classList.remove('show');
        }
    }

    // 去微信
    window.goToWechat = function() {
        window.closeCopyModal();
        // 尝试打开微信
        const wechat = window.currentService?.wechat || window.wechat;
        // 尝试使用微信协议
        window.location.href = 'weixin://';
    }

    // 拨打电话
    window.callPhone = function() {
        window.closeCopyModal();
        const phone = window.currentService?.mobile || window.phone;
        window.location.href = "tel:" + phone;
    }

    // 点击背景关闭弹窗
    document.addEventListener('click', function(e) {
        const modal = document.getElementById('copyModal');
        if (modal && modal.classList.contains('show')) {
            if (e.target === modal) {
                window.closeCopyModal();
            }
        }
    });
})();
</script>
