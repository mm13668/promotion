<!-- 全局成功弹窗模板 -->
<div id="copySuccessPopup" style="display: none;">
    <div class="popup-overlay" onclick="hideCopySuccessPopup()"></div>
    <div class="popup-container">
        <div class="popup-close" onclick="hideCopySuccessPopup()">×</div>
        <div class="popup-header">
            <span class="success-icon">✅</span>
            <div class="popup-title">微信号已为您复制成功</div>
        </div>
        <div class="popup-actions">
            <button class="action-btn call-btn" onclick="callCustomerService()">拨打电话</button>
            <button class="action-btn wechat-btn" onclick="goToWechat()">去微信</button>
        </div>
    </div>
</div>

<style>
/* 弹窗通用样式 */
#copySuccessPopup {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10000;
}
.popup-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.5);
}
.popup-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #fff;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}
.popup-close {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 24px;
    color: #999;
    cursor: pointer;
    line-height: 1;
}
.popup-close:hover {
    color: #333;
}
.popup-header {
    margin-bottom: 24px;
}
.success-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
}
.popup-title {
    font-size: 18px;
    font-weight: bold;
    color: #333;
}
.popup-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
}
.action-btn {
    flex: 1;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
}
.action-btn:active {
    opacity: 0.8;
}
.call-btn {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: #fff;
}
.wechat-btn {
    background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
    color: #fff;
}
</style>

<script>
(function() {
    // 复制微信逻辑
    window.copyWechat = function() {
        // 多重容错取微信账号
        const wechat = window.currentService?.wechat || window.wechat;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(wechat).then(function() {
                showCopySuccessPopup();
                // 上报复制事件
                if (window.LANDING_VISIT_ID) {
                            fetch('/api/promotion/landingVisit/reportCopy', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    id: Number(window.LANDING_VISIT_ID),
                                    servicePhone: window.currentService?.mobile || '',
                                    serviceNickname: window.currentService?.nickname || ''
                                })
                            });
                }
            }).catch(function() {
                fallbackCopy(wechat);
            });
        } else {
            fallbackCopy(wechat);
        }
    }

    function fallbackCopy(text) {
        const input = document.createElement('input');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showCopySuccessPopup();
        // 上报复制事件
        if (window.LANDING_VISIT_ID) {
            fetch('/promotion/landingVisit/reportCopy', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id: window.LANDING_VISIT_ID,
                    servicePhone: window.currentService?.mobile || '',
                    serviceNickname: window.currentService?.nickname || ''
                })
            });
        }
    }

    // 显示复制成功弹窗
    window.showCopySuccessPopup = function() {
        const popup = document.getElementById('copySuccessPopup');
        if (popup) {
            popup.style.display = 'block';
            // 禁止背景滚动
            document.body.style.overflow = 'hidden';
        } else {
            // 降级处理
            alert('微信复制成功，快去添加好友吧！');
        }
    }

    // 隐藏弹窗
    window.hideCopySuccessPopup = function() {
        const popup = document.getElementById('copySuccessPopup');
        if (popup) {
            popup.style.display = 'none';
            // 恢复背景滚动
            document.body.style.overflow = '';
        }
    }

    // 拨打电话
    window.callCustomerService = function() {
        const phone = window.currentService?.mobile || window.phone || "400-123-4567";
        // 判断是否是移动端
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            window.location.href = "tel:" + phone;
        } else {
            alert("请使用手机拨打客服电话：" + phone);
        }
        hideCopySuccessPopup();
    }

    // 去微信
    window.goToWechat = function() {
        alert("已复制微信号，请到微信搜索添加好友");
        hideCopySuccessPopup();
    }

    // 页面加载完成后把弹窗添加到body，解决插件注入位置问题
    document.addEventListener('DOMContentLoaded', function() {
        const popup = document.getElementById('copySuccessPopup');
        if (popup && popup.parentNode !== document.body) {
            document.body.appendChild(popup);
        }
    });
})();
</script>
