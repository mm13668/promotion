<div class="plugin-bottom-bar-1">
    <div class="bar-item phone" onclick="callPhone()">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
        </div>
        <span class="text">电话咨询</span>
    </div>
    <div class="bar-item wechat" onclick="copyWechat()">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 0 1-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
        </div>
        <span class="text">复制微信</span>
    </div>
</div>
<style>
.plugin-bottom-bar-1 {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08), 0 -1px 3px rgba(0,0,0,0.05);
    display: flex;
    z-index: 9998;
    padding: 8px 16px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    gap: 12px;
}

.plugin-bottom-bar-1 .bar-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #333;
    text-decoration: none;
    cursor: pointer;
    border-radius: 12px;
    padding: 8px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
    border: 1px solid #dee2e6;
    position: relative;
    overflow: hidden;
}

.plugin-bottom-bar-1 .bar-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 100%);
    opacity: 0;
    transition: opacity 0.3s;
}

.plugin-bottom-bar-1 .bar-item:active::before {
    opacity: 1;
}

.plugin-bottom-bar-1 .bar-item:active {
    transform: scale(0.96);
}

.plugin-bottom-bar-1 .bar-item.phone {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    border: none;
    color: #fff;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.plugin-bottom-bar-1 .bar-item.phone:active {
    box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3);
}

.plugin-bottom-bar-1 .bar-item.wechat {
    background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
    border: none;
    color: #fff;
    box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
}

.plugin-bottom-bar-1 .bar-item.wechat:active {
    box-shadow: 0 2px 6px rgba(7, 193, 96, 0.3);
}

.plugin-bottom-bar-1 .icon-wrapper {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
    border-radius: 8px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
}

.plugin-bottom-bar-1 .icon-wrapper svg {
    width: 20px;
    height: 20px;
    stroke-width: 2;
}

.plugin-bottom-bar-1 .text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
}

/* 移动端适配 */
@media (max-width: 480px) {
    .plugin-bottom-bar-1 {
        height: 65px;
        padding: 6px 12px;
        padding-bottom: max(6px, env(safe-area-inset-bottom));
        gap: 10px;
    }
    
    .plugin-bottom-bar-1 .bar-item {
        padding: 6px;
        border-radius: 10px;
    }
    
    .plugin-bottom-bar-1 .icon-wrapper {
        width: 28px;
        height: 28px;
        margin-bottom: 3px;
    }
    
    .plugin-bottom-bar-1 .icon-wrapper svg {
        width: 18px;
        height: 18px;
    }
    
    .plugin-bottom-bar-1 .text {
        font-size: 12px;
    }
}
</style>
<script>
(function() {
    window.callPhone = function() {
        // 多重容错取电话号码
        const phone = window.currentService?.mobile || window.phone;
        window.location.href = "tel:" + phone;
    }

    window.copyWechat = function() {
        // 多重容错取微信账号
        const wechat = window.currentService?.wechat || window.wechat;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(wechat).then(function() {
                // 调用复制插件的弹窗方法
                if (window.showCopySuccessPopup) {
                    window.showCopySuccessPopup();
                } else {
                    alert('微信复制成功！');
                }
            }).catch(function() {
                // 降级处理
                const input = document.createElement('input');
                input.value = wechat;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                if (window.showCopySuccessPopup) {
                    window.showCopySuccessPopup();
                } else {
                    alert('微信复制成功！');
                }
            });
        } else {
            // 降级处理
            const input = document.createElement('input');
            input.value = wechat;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            if (window.showCopySuccessPopup) {
                window.showCopySuccessPopup();
            } else {
                alert('微信复制成功！');
            }
        }
    }
})();
</script>
