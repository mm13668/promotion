<div class="plugin-pc-qrcode-1">
    <div class="qrcode-card">
        <div class="qrcode-title">扫码咨询</div>
        <img src="" alt="微信二维码" class="qrcode-img">
        <div class="qrcode-desc">微信：<span class="wechat">{{wechat}}</span></div>
        <button class="copy-btn" onclick="copyWechat()">复制微信</button>
    </div>
</div>
<style>
.plugin-pc-qrcode-1 {
    position: sticky;
    top: 40px;
}
.plugin-pc-qrcode-1 .qrcode-card {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    text-align: center;
}
.plugin-pc-qrcode-1 .qrcode-title {
    font-size: 18px;
    font-weight: bold;
    color: #333;
    margin-bottom: 15px;
}
.plugin-pc-qrcode-1 .qrcode-img {
    width: 200px;
    height: 200px;
    margin-bottom: 15px;
    border-radius: 4px;
}
.plugin-pc-qrcode-1 .qrcode-desc {
    font-size: 14px;
    color: #666;
    margin-bottom: 15px;
}
.plugin-pc-qrcode-1 .wechat {
    color: #07c160;
    font-weight: bold;
}
.plugin-pc-qrcode-1 .copy-btn {
    width: 100%;
    padding: 10px;
    background-color: #07c160;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
}
</style>
<script>
(function() {
    // PC端二维码插件的复制方法，调用手机端复制插件的弹窗
    window.copyWechatFromQrcode = function() {
        // 优先使用模板已缓存的当前客服，和页面其他位置保持一致
        const wechat = window.currentService?.wechat;
        // 调用手机端复制插件的复制逻辑
        if (navigator.clipboard) {
            navigator.clipboard.writeText(wechat).then(function() {
                // 调用手机端复制插件的弹窗方法
                if (window.showCopySuccessPopup) {
                    window.showCopySuccessPopup();
                } else {
                    alert('微信复制成功！');
                }
                // 上报复制事件
                if (window.LANDING_VISIT_ID) {
                    fetch('/api/promotion/landingVisit/reportCopy', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            id: Number(window.LANDING_VISIT_ID),
                            servicePhone: window.currentService?.mobile || '',
                            serviceNickname: window.currentService?.nickname || ''
                        })
                    });
                }
            }).catch(function() {
                // 降级处理
                const input = document.createElement('input');
                input.value = wechat;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                if (window.showCopySuccessPopup) {
                    window.showCopySuccessPopup();
                } else {
                    alert('微信复制成功！');
                }
                // 上报复制事件
                if (window.LANDING_VISIT_ID) {
                    fetch('/api/promotion/landingVisit/reportCopy', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            id: Number(window.LANDING_VISIT_ID),
                            servicePhone: window.currentService?.mobile || '',
                            serviceNickname: window.currentService?.nickname || ''
                        })
                    });
                }
            });
        } else {
            // 降级处理
            const input = document.createElement('input');
            input.value = wechat;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            if (window.showCopySuccessPopup) {
                window.showCopySuccessPopup();
            } else {
                alert('微信复制成功！');
            }
            // 上报复制事件
            if (window.LANDING_VISIT_ID) {
                fetch('/api/promotion/landingVisit/reportCopy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: Number(window.LANDING_VISIT_ID),
                        servicePhone: window.currentService?.mobile || '',
                        serviceNickname: window.currentService?.nickname || ''
                    })
                });
            }
        }
    }

    // 页面加载完成后替换微信和二维码显示，并修改按钮的onclick
    document.addEventListener('DOMContentLoaded', function() {
        // 优先使用模板已缓存的当前客服，和页面其他位置保持一致，避免重复随机
        const wechat = window.currentService?.wechat;
        const wechatQrcode = window.currentService?.wechat_qrcode;
        const wechatEl = document.querySelector('.plugin-pc-qrcode-1 .wechat');
        const wechatQrcodeEl = document.querySelector('.plugin-pc-qrcode-1 .qrcode-img');
        const copyBtn = document.querySelector('.plugin-pc-qrcode-1 .copy-btn');
        if (wechatEl) {
            wechatEl.textContent = wechat;
        }
        if (wechatQrcodeEl) {
            wechatQrcodeEl.src = "/api/" + wechatQrcode;
            wechatQrcodeEl.onerror = function() {
                // 图片加载失败时使用默认占位图
                this.src = "https://picsum.photos/200/200";
            }
        }
        // 修改复制按钮的onclick事件，调用PC端二维码插件的复制方法
        if (copyBtn) {
            copyBtn.onclick = function() {
                window.copyWechatFromQrcode();
            };
        }
    });
})();
</script>
