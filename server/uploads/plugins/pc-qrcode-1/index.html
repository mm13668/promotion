<div class="plugin-pc-qrcode-1">
    <div class="qrcode-card">
        <div class="qrcode-title">扫码咨询</div>
        <img src="/api/{{wechatQrcode}}" alt="微信二维码" class="qrcode-img">
        <div class="qrcode-desc">微信：<span class="wechat">{{wechat}}</span></div>
        <button class="copy-btn" onclick="copyWechat()">复制微信</button>
    </div>
</div>
<style>
.plugin-pc-qrcode-1 {
    position: sticky;
    top: 40px;
}
.plugin-pc-qrcode-1 .qrcode-card {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    text-align: center;
}
.plugin-pc-qrcode-1 .qrcode-title {
    font-size: 18px;
    font-weight: bold;
    color: #333;
    margin-bottom: 15px;
}
.plugin-pc-qrcode-1 .qrcode-img {
    width: 200px;
    height: 200px;
    margin-bottom: 15px;
    border-radius: 4px;
}
.plugin-pc-qrcode-1 .qrcode-desc {
    font-size: 14px;
    color: #666;
    margin-bottom: 15px;
}
.plugin-pc-qrcode-1 .wechat {
    color: #07c160;
    font-weight: bold;
}
.plugin-pc-qrcode-1 .copy-btn {
    width: 100%;
    padding: 10px;
    background-color: #07c160;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
}
</style>
<script>
(function() {
    // 从客服列表中随机选取一个客服
    function getRandomService() {
        try {
            const serviceList = JSON.parse(window.serviceListJSON || "[]");
            if (serviceList.length > 0) {
                const randomIndex = Math.floor(Math.random() * serviceList.length);
                return serviceList[randomIndex];
            }
        } catch (e) {
            console.error("解析客服列表失败", e);
        }
        return null;
    }

    window.copyWechat = function() {
        const service = getRandomService();
        const wechat = service?.wechat || window.wechat || "{{wechat}}" || "kefu123";
        navigator.clipboard.writeText(wechat).then(function() {
            alert('微信复制成功！');
        });
    }

    // 页面加载完成后替换微信和二维码显示
    document.addEventListener('DOMContentLoaded', function() {
        const service = getRandomService();
        const wechat = service?.wechat || window.wechat || "{{wechat}}" || "kefu123";
        const wechatQrcode = service?.wechat_qrcode || window.wechatQrcode || "{{qrcodeUrl}}" || "file/c20ad4d76fe97759aa27a0c99bff6710_20260325224404.png";
        const wechatEl = document.querySelector('.plugin-pc-qrcode-1 .wechat');
        const wechatQrcodeEl = document.querySelector('.plugin-pc-qrcode-1 .qrcode-img');
        if (wechatEl) {
            wechatEl.textContent = wechat;
        }
        if (wechatQrcodeEl) {
            wechatQrcodeEl.src = "/api/" + wechatQrcode;
            wechatQrcodeEl.onerror = function() {
                // 图片加载失败时使用默认占位图
                this.src = "https://picsum.photos/200/200";
            }
        }
    });
})();
</script>
